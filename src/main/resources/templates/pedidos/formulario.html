<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Pedido</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <a th:href="@{/pedidos}" class="btn btn-outline-light btn-sm">← Pedidos</a>
</nav>

<div class="container mt-4" style="max-width: 600px;">
    <h4 class="mb-4">📋 Nuevo Pedido</h4>

    <form th:action="@{/pedidos/guardar}" method="post">

        <div class="mb-3">
            <label class="form-label">Número de Mesa</label>
            <input type="number" name="numeroMesa" class="form-control" min="1" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Mesero</label>
            <select name="mesero.idUsuario" class="form-select" required>
                <option value="">Seleccione...</option>
                <option th:each="m : ${meseros}"
                        th:value="${m.idUsuario}"
                        th:text="${m.nombre}"></option>
            </select>
        </div>

        <hr>
        <h6 class="mb-3">Productos del pedido</h6>

        <div id="detalles">
            <div class="row g-2 mb-2 detalle-item">
                <div class="col-7">
                    <select name="detalles[0].producto.id" class="form-select producto-select" required>
                        <option value="">Seleccione producto...</option>
                        <option th:each="p : ${productos}"
                                th:value="${p.id}"
                                th:text="${p.nombre} + ' - $' + ${p.precio}"></option>
                    </select>
                </div>
                <div class="col-3">
                    <input type="number" name="detalles[0].cantidad"
                           class="form-control" placeholder="Cantidad" min="1" value="1" required>
                </div>
                <div class="col-2">
                    <button type="button" class="btn btn-danger w-100"
                            onclick="eliminarDetalle(this)">✕</button>
                </div>
            </div>
        </div>

        <button type="button" class="btn btn-outline-secondary mb-4"
                onclick="agregarDetalle()">+ Agregar producto</button>

        <br>
        <button type="submit" class="btn btn-primary w-100">Crear Pedido</button>

    </form>
</div>

<script>
    let index = 1;

    function agregarDetalle() {
        const primerSelect = document.querySelector('.producto-select');
        const opciones = primerSelect.innerHTML;
        const div = document.createElement('div');
        div.className = 'row g-2 mb-2 detalle-item';
        div.innerHTML =
            '<div class="col-7">' +
                '<select name="detalles[' + index + '].producto.id" class="form-select" required>' +
                    opciones +
                '</select>' +
            '</div>' +
            '<div class="col-3">' +
                '<input type="number" name="detalles[' + index + '].cantidad" ' +
                       'class="form-control" placeholder="Cantidad" min="1" value="1" required>' +
            '</div>' +
            '<div class="col-2">' +
                '<button type="button" class="btn btn-danger w-100" ' +
                        'onclick="eliminarDetalle(this)">✕</button>' +
            '</div>';
        document.getElementById('detalles').appendChild(div);
        index++;
    }

    function eliminarDetalle(btn) {
        const items = document.querySelectorAll('.detalle-item');
        if (items.length > 1) {
            btn.closest('.detalle-item').remove();
        }
    }
</script>
</body>
</html>
