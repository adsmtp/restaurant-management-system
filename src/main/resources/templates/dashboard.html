<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <div class="d-flex align-items-center gap-3">
        <span class="text-white" sec:authentication="name"></span>
        <form th:action="@{/logout}" method="post" style="display:inline;">
    <button type="submit" class="btn btn-outline-light btn-sm">Cerrar sesión</button>
</form>
    </div>
</nav>

<div class="container mt-5">
    <h4 class="mb-4">Panel Principal</h4>
    <div class="row g-4">

        <div class="col-md-3" sec:authorize="hasAnyRole('ADMIN','MESERO','CAJERO')">
            <a th:href="@{/pedidos}" class="text-decoration-none">
                <div class="card text-white bg-primary text-center p-4 shadow">
                    <h5>📋 Pedidos</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3" sec:authorize="hasAnyRole('ADMIN','MESERO')">
            <a th:href="@{/inventario}" class="text-decoration-none">
                <div class="card text-white bg-success text-center p-4 shadow">
                    <h5>📦 Inventario</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3" sec:authorize="hasAnyRole('ADMIN','CAJERO')">
            <a th:href="@{/pagos}" class="text-decoration-none">
                <div class="card text-white bg-warning text-center p-4 shadow">
                    <h5>💰 Pagos</h5>
                </div>
            </a>
        </div>

        <div class="col-md-3" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/usuarios}" class="text-decoration-none">
                <div class="card text-white bg-danger text-center p-4 shadow">
                    <h5>👥 Usuarios</h5>
                </div>
            </a>
        </div>

    </div>
</div>
</body>
</html>
