<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Usuarios</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">← Dashboard</a>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>👥 Usuarios</h4>
        <a th:href="@{/usuarios/nuevo}" class="btn btn-success">+ Nuevo Usuario</a>
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Usuario</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${usuarios}">
                <td th:text="${u.idUsuario}"></td>
                <td th:text="${u.nombre}"></td>
                <td th:text="${u.username}"></td>
                <td>
                    <span class="badge bg-secondary" th:text="${u.rol}"></span>
                </td>
                <td>
                    <a th:href="@{/usuarios/editar/{id}(id=${u.idUsuario})}" 
                       class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/usuarios/eliminar/{id}(id=${u.idUsuario})}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Eliminar usuario?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
