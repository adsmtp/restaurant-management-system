<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inventario</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">← Dashboard</a>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h4>📦 Inventario</h4>
        <a th:href="@{/inventario/nuevo}" class="btn btn-success">+ Nuevo Producto</a>
    </div>

    <div th:if="${stockBajo.size() > 0}" class="alert alert-warning">
        ⚠️ <strong th:text="${stockBajo.size()}"></strong> producto(s) con stock bajo.
    </div>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Stock Mínimo</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${productos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.nombre}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(p.precio, 1, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${p.stock}"></td>
                <td th:text="${p.stockMinimo}"></td>
                <td>
                    <span th:if="${p.stock <= p.stockMinimo}" 
                          class="badge bg-danger">Stock bajo</span>
                    <span th:if="${p.stock > p.stockMinimo}" 
                          class="badge bg-success">OK</span>
                </td>
                <td>
                    <a th:href="@{/inventario/editar/{id}(id=${p.id})}" 
                       class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/inventario/eliminar/{id}(id=${p.id})}" 
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Eliminar producto?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
