<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Producto</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <a th:href="@{/inventario}" class="btn btn-outline-light btn-sm">← Inventario</a>
</nav>

<div class="container mt-4" style="max-width: 500px;">
    <h4 class="mb-4">📦 Producto</h4>

    <form th:action="@{/inventario/guardar}" th:object="${producto}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" th:field="*{nombre}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Precio</label>
            <input type="number" th:field="*{precio}" class="form-control" 
                   step="0.01" min="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" th:field="*{stock}" class="form-control" min="0" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock Mínimo</label>
            <input type="number" th:field="*{stockMinimo}" class="form-control" 
                   min="0" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Guardar</button>
    </form>
</div>
</body>
</html>
