<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Pagos</title>
    <link rel="stylesheet" 
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">🍽️ Gestión Restaurante</span>
    <a th:href="@{/dashboard}" class="btn btn-outline-light btn-sm">← Dashboard</a>
</nav>

<div class="container mt-4">
    <h4 class="mb-4">💰 Pagos</h4>

    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>#</th>
                <th>Pedido</th>
                <th>Mesa</th>
                <th>Cajero</th>
                <th>Método</th>
                <th>Monto</th>
                <th>Fecha</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="p : ${pagos}">
                <td th:text="${p.id}"></td>
                <td th:text="${p.pedido.id}"></td>
                <td th:text="${p.pedido.numeroMesa}"></td>
                <td th:text="${p.cajero.nombre}"></td>
                <td th:text="${p.metodoPago}"></td>
                <td th:text="'$' + ${#numbers.formatDecimal(p.monto, 1, 'COMMA', 0, 'POINT')}"></td>
                <td th:text="${p.fecha}"></td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
